<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning with an Asian's Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .calculator { background: #2b569e; width: 340px; padding: 20px; border-radius: 40px 40px 60px 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 2px solid #1e3d70; position: relative; }
        .screen-container { background: #000; padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 4px solid #333; }
        .screen { background: #9ead86; height: 140px; border-radius: 4px; padding: 10px; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: space-between; }
        .screen-current { font-size: 24px; text-align: right; color: #000; font-weight: bold; }
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .btn { height: 35px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; text-transform: uppercase; box-shadow: 0 3px 0 #152d52; }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #152d52; }
        .btn-2nd { background: #7ec8e3; color: #003366; }
        .btn-2nd.active { background: #fff; box-shadow: 0 0 10px #7ec8e3; }
        .btn-blue-func { background: #4b78c8; }
        .btn-dark-gray { background: #333; }
        .btn-num { background: #ffffff; color: #333; font-size: 16px; }
        #launch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); border-radius: 40px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
    </style>
</head>
<body>

    <div class="calculator">
        <div id="launch-overlay">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-white mb-4"></div>
            <p id="overlay-text" class="text-lg font-bold">SYSTEM BOOT...</p>
        </div>

        <div class="screen-container">
            <div class="screen">
                <div id="screen-history" style="text-align:right; opacity:0.6; font-size:12px;"></div>
                <div id="screen-current" class="screen-current">0</div>
            </div>
        </div>

        <div class="keypad">
            <button class="btn btn-blue-func" onclick="clearScreen()">y=</button>
            <button class="btn btn-blue-func" onclick="clearScreen()">window</button>
            <button class="btn btn-blue-func" onclick="clearScreen()">zoom</button>
            <button class="btn btn-blue-func" onclick="clearScreen()">trace</button>
            <button class="btn btn-blue-func" onclick="clearScreen()">graph</button>

            <button id="btn-2nd" class="btn btn-2nd" onclick="toggle2nd()">2nd</button>
            <button class="btn btn-dark-gray" onclick="clearScreen()">mode</button>
            <button class="btn btn-dark-gray" onclick="deleteChar()">del</button>
            <div class="col-span-2"></div>

            <button class="btn btn-dark-gray" onclick="clearScreen()">math</button>
            <button class="btn btn-dark-gray" onclick="clearScreen()">apps</button>
            <button class="btn btn-dark-gray" onclick="clearScreen()">prgm</button>
            <button class="btn btn-dark-gray" onclick="clearScreen()">vars</button>
            <button class="btn btn-dark-gray" onclick="handleClear()">clear</button>

            <button class="btn btn-num" onclick="append('7')">7</button>
            <button class="btn btn-num" onclick="append('8')">8</button>
            <button class="btn btn-num" onclick="append('9')">9</button>
            <button class="btn btn-dark-gray" onclick="append('*')">×</button>
            <button class="btn btn-dark-gray" onclick="clearScreen()">on</button>

            <button class="btn btn-num" onclick="append('4')">4</button>
            <button class="btn btn-num" onclick="append('5')">5</button>
            <button class="btn btn-num" onclick="append('6')">6</button>
            <button class="btn btn-dark-gray" onclick="append('-')">-</button>
            <button class="btn btn-dark-gray" onclick="handleEnter()" style="grid-column: span 2; background: #333;">enter</button>
        </div>
    </div>

    <script>
        let currentInput = "0";
        let is2ndActive = false;

        const screenCurrent = document.getElementById('screen-current');
        const overlay = document.getElementById('launch-overlay');
        const overlayText = document.getElementById('overlay-text');
        const btn2nd = document.getElementById('btn-2nd');

        // SCRAMBLED TARGETS (Base64)
        const vault = {
            f1: "aHR0cHM6Ly9wbGF5LmZyb2dpZWUxLm5ldC8=",
            f2: "aHR0cHM6Ly9mcm9naWVlaXNiYWNrLWVkdS56b25lLmlkLw==",
            ext: "aHR0cHM6Ly9jZG4uanNkZWxpdnIubmV0L2doL2duLW1hdGgvZ24tbWF0aC1ET05URE1DQUBtYWluL3NpbmdsZWZpbGUuaHRtbA=="
        };

        function append(val) {
            currentInput = currentInput === "0" ? val : currentInput + val;
            updateDisplay();
        }

        function updateDisplay() { screenCurrent.textContent = currentInput; }
        function toggle2nd() { is2ndActive = !is2ndActive; btn2nd.classList.toggle('active', is2ndActive); }
        function clearScreen() { currentInput = "0"; updateDisplay(); }

        // --- THE "GHOST" LAUNCHER ---
        function ghostLaunch(encodedUrl, msg) {
            overlayText.textContent = msg;
            overlay.style.display = 'flex';
            
            const decoded = atob(encodedUrl);
            const win = window.open("about:blank", "_blank");
            
            if (win) {
                // This creates a data-blob environment that filters can't easily scan
                const content = `
                <!DOCTYPE html>
                <html>
                <head><title>System Processor</title></head>
                <body style="margin:0;padding:0;overflow:hidden;background:#000;">
                    <iframe src="${decoded}" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>
                    <script>
                        // Self-destruct logic: if the iframe is blocked, try a redirect
                        window.addEventListener('message', (e) => {
                            if(e.data === 'blocked') window.location.replace('${decoded}');
                        });
                    <\/script>
                </body>
                </html>`;
                
                win.document.open();
                win.document.write(content);
                win.document.close();
            } else {
                alert("Pop-up blocked! Enable them to use the system.");
            }
            
            setTimeout(() => { overlay.style.display = 'none'; }, 800);
        }

        function handleClear() {
            if (is2ndActive) { ghostLaunch(vault.f1, "CLEANING RAM..."); reset2nd(); }
            else clearScreen();
        }

        function deleteChar() {
            if (is2ndActive) { ghostLaunch(vault.f2, "DEFRAGMENTING..."); reset2nd(); }
            else { currentInput = currentInput.slice(0, -1) || "0"; updateDisplay(); }
        }

        function handleEnter() {
            if (is2ndActive) { ghostLaunch(vault.ext, "SYNCING DATA..."); reset2nd(); }
            else { /* Math Logic */ }
        }

        function reset2nd() { is2ndActive = false; btn2nd.classList.remove('active'); }
    </script>
</body>
</html>
